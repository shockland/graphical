runners:
  claude_code:
    command: claude
    args:
    - -p
    - '{{prompt_file}}'
    - --model
    - '{{model}}'
    cwd: '{{project_root}}'
    env: {}
    kind: claude_code
    default_model: sonnet
  cursor_agent:
    command: /bin/bash
    args:
    - -lc
    - 'set -euo pipefail

      export PATH="$HOME/.local/bin:$PATH"

      cursor-agent -p --trust --force --workspace {{project_root}} --model {{model}}
      "$(cat {{prompt_file}})"

      '
    cwd: '{{project_root}}'
    env: {}
    kind: cursor_agent
    default_model: composer-2.5-fast
