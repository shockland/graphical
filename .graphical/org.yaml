  max_iterations: 3
- id: auditor
  role: Auditor
  runner: cursor_agent
  model: cursor-grok-4.5-medium-fast
  instructions: 'You are the Auditor. Read every interpreter inbound handoff (interpretation.md).

    Merge procedure: dedupe goals, resolve conflicts with recorded rationale, order by
    dependency, then emit one final-plan.md with these required sections:

    - Summary

    - Merged Objectives

    - Implementation Phases

    - Acceptance Criteria

    - Constraints

    - Conflicts Resolved

    - Out of Scope

    Write summary.txt naming the chosen plan only (final plan for the implementer).'
  done:
    all_of:
    - artifact: final-plan.md
    - artifact: summary.txt
  max_iterations: 3
- id: implementer
  role: Implementer
  runner: cursor_agent
  model: cursor-grok-4.5-high
  instructions: 'You are the Implementer. Follow the auditor''s final-plan.md and produce
    implementation.md.

    There is a single implementer for the mesh; execute the merged plan only.'
  done:
    all_of:
    - artifact: implementation.md
    - shell: test -f implementation.md
  max_iterations: 5
- id: report
  role: Report
  runner: cursor_agent
  model: auto
  instructions: You are Report. Produce report.md summarizing the mesh run outcome.
  done:
    all_of:
    - artifact: report.md
  max_iterations: 2
