nodes:
- id: entry
  role: Coordinator
  runner: cursor_agent
  model: cursor-grok-4.5-high-fast
  instructions: 'You are the mesh coordinator. Confirm the goal is ready, then write
    summary.txt.

    Fan-out will activate all planner lanes.'
  done:
    all_of:
    - artifact: summary.txt
  max_iterations: 1
- id: planner-1
  role: Planner
  runner: cursor_agent
  model: cursor-grok-4.5-high
  instructions: 'You are Planner lane 1 of 5. You have your own coding tool and model
    (configured on this node). Read the goal and produce plan.md with your approach.

    Also write summary.txt with exactly one sentence summarizing the plan for your
    paired interpreter. Do not coordinate with other planner lanes.'
  done:
    all_of:
    - artifact: plan.md
    - artifact: summary.txt
  max_iterations: 3
- id: interpreter-1
  role: Interpreter
  runner: cursor_agent
  model: cursor-grok-4.5-high
  instructions: 'You are Interpreter lane 1 of 5. Read inbound plan.md from your paired
    planner. Extract goals — do not re-plan.

    Produce interpretation.md with these required sections:

    - Plan goals (numbered list)

    - Approach summary

    - Risks / conflicts for auditor

    Write summary.txt as one line stating the goal count (e.g. "3 goals extracted").'
  done:
    all_of:
    - artifact: interpretation.md
    - artifact: summary.txt
  max_iterations: 3
